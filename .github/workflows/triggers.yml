name: Triggers Workflow

on:
    push:
    pull_request:
    workflow_dispatch:
        inputs:
            example_input:
                description: 'An example input for manual trigger'
                required: false
                default: 'Richy'

jobs:
  trigger_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run a script
        run: echo "This workflow was triggered by a ${{ github.event_name }} event."

